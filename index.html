<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<title>Orma. — Designed for Living</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Orma — Homes shaped by clarity, light, and purpose. Residential projects in Porto and Santo Tirso, northern Portugal." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500,600,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; font-family: "General Sans", system-ui, sans-serif; background: #FFFFFF; color: #1F2022; }
  img { max-width: 100%; display: block; }
  button { cursor: pointer; }
  button:hover { opacity: 0.92; }
  a { transition: opacity 180ms; }
  a:hover { opacity: 0.78; }
  input::placeholder, textarea::placeholder { color: #5C645799; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #5C645744; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="homepage.jsx"></script>

  <script type="text/babel">
    const Homepage = window.DesktopHomepage;

    function App() {
      return <Homepage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
