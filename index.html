<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<title>Orma. — Designed for Living</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Orma — Homes shaped by clarity, light, and purpose. Residential projects in Porto and Santo Tirso, northern Portugal." />
<style>
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Extralight.otf") format("opentype"); font-weight: 200; font-style: normal; font-display: swap; }
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Light.otf") format("opentype"); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Regular.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Semibold.otf") format("opentype"); font-weight: 600; font-style: normal; font-display: swap; }
  @font-face { font-family: "General Sans"; src: url("fonts/GeneralSans-Bold.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; font-family: "General Sans", system-ui, sans-serif; background: #FFFFFF; color: #1F2022; }
  img { max-width: 100%; display: block; }
  button { cursor: pointer; }
  button:hover { opacity: 0.92; }
  a { transition: opacity 180ms; }
  a:hover { opacity: 0.78; }
  input::placeholder, textarea::placeholder { color: #5C645799; }
  html { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="homepage.jsx"></script>

  <script type="text/babel">
    const Homepage = window.DesktopHomepage;

    function App() {
      return <Homepage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
